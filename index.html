<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>待辦清單</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
      min-height: 100vh;
    }

    header {
      background: #fff;
      padding: 20px 16px 12px;
      border-bottom: 1px solid #e5e5ea;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1c1c1e;
    }

    header p {
      font-size: 13px;
      color: #8e8e93;
      margin-top: 2px;
    }

    .add-section {
      background: #fff;
      margin: 16px;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .add-section h2 {
      font-size: 15px;
      font-weight: 600;
      color: #3a3a3c;
      margin-bottom: 12px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: #8e8e93;
      margin-bottom: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .field input, .field select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #d1d1d6;
      border-radius: 10px;
      font-size: 16px;
      background: #f9f9fb;
      color: #1c1c1e;
      outline: none;
      -webkit-appearance: none;
    }

    .field input:focus, .field select:focus {
      border-color: #007aff;
      background: #fff;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .field {
      flex: 1;
    }

    button.add-btn {
      width: 100%;
      padding: 13px;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      margin-top: 4px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button.add-btn:active { opacity: 0.75; }

    .notify-btn {
      width: 100%;
      padding: 11px;
      background: #34c759;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .notify-btn:active { opacity: 0.75; }

    .notify-status {
      font-size: 12px;
      color: #8e8e93;
      text-align: center;
      margin-top: 6px;
    }

    .list-section {
      margin: 0 16px 30px;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 4px;
    }

    .list-header h2 {
      font-size: 17px;
      font-weight: 600;
    }

    .list-header span {
      font-size: 13px;
      color: #8e8e93;
    }

    .empty {
      text-align: center;
      color: #aeaeb2;
      padding: 40px 20px;
      font-size: 15px;
    }

    .item {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: opacity 0.2s;
    }

    .item.done {
      opacity: 0.5;
    }

    .item.done .item-title {
      text-decoration: line-through;
      color: #8e8e93;
    }

    .item-check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #d1d1d6;
      background: #fff;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all 0.15s;
    }

    .item.done .item-check {
      background: #34c759;
      border-color: #34c759;
    }

    .item-check svg {
      display: none;
    }

    .item.done .item-check svg {
      display: block;
    }

    .item-body {
      flex: 1;
      min-width: 0;
    }

    .item-title {
      font-size: 16px;
      font-weight: 500;
      word-break: break-word;
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }

    .tag.category {
      background: #e5f0ff;
      color: #007aff;
    }

    .tag.time {
      background: #fff3e0;
      color: #e65100;
    }

    .tag.notify {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .item-delete {
      background: none;
      border: none;
      color: #aeaeb2;
      font-size: 20px;
      cursor: pointer;
      padding: 0 0 0 4px;
      line-height: 1;
      flex-shrink: 0;
    }

    .item-delete:active { color: #ff3b30; }

    .tabs {
      display: flex;
      gap: 8px;
      margin: 0 16px 14px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 10px;
      background: #e5e5ea;
      color: #3a3a3c;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab.active {
      background: #007aff;
      color: #fff;
    }
  </style>
</head>
<body>

<header>
  <h1>📋 待辦清單</h1>
  <p>買嘢 · 事項 · 提醒</p>
</header>

<div class="add-section">
  <h2>新增項目</h2>

  <div class="field">
    <label>標題</label>
    <input type="text" id="titleInput" placeholder="例：買牛奶、交功課…" />
  </div>

  <div class="row">
    <div class="field">
      <label>分類</label>
      <select id="catInput">
        <option value="購物">🛒 購物</option>
        <option value="功課">📚 功課</option>
        <option value="工作">💼 工作</option>
        <option value="其他">📌 其他</option>
      </select>
    </div>
    <div class="field">
      <label>提醒日期</label>
      <input type="date" id="dateInput" />
    </div>
  </div>

  <div class="field">
    <label>提醒時間（會喺前30分鐘通知）</label>
    <input type="time" id="timeInput" />
  </div>

  <button class="add-btn" onclick="addItem()">＋ 加入清單</button>

  <button class="notify-btn" onclick="requestNotify()">🔔 開啟通知權限</button>
  <div class="notify-status" id="notifyStatus">狀態：未知</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('pending', this)">待辦</button>
  <button class="tab" onclick="switchTab('done', this)">已完成</button>
</div>

<div class="list-section">
  <div class="list-header">
    <h2 id="tabTitle">待辦事項</h2>
    <span id="countLabel"></span>
  </div>
  <div id="itemList"></div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('todoItems') || '[]');
  let currentTab = 'pending';
  let timers = {};

  function save() {
    localStorage.setItem('todoItems', JSON.stringify(items));
  }

  function addItem() {
    const title = document.getElementById('titleInput').value.trim();
    const cat = document.getElementById('catInput').value;
    const date = document.getElementById('dateInput').value;
    const time = document.getElementById('timeInput').value;

    if (!title) {
      alert('請輸入標題！');
      return;
    }

    const item = {
      id: Date.now(),
      title,
      category: cat,
      date: date || null,
      time: time || null,
      done: false,
      created: new Date().toISOString()
    };

    items.unshift(item);
    save();
    render();
    scheduleNotification(item);

    document.getElementById('titleInput').value = '';
    document.getElementById('dateInput').value = '';
    document.getElementById('timeInput').value = '';
  }

  function toggleDone(id) {
    const item = items.find(i => i.id === id);
    if (item) {
      item.done = !item.done;
      save();
      render();
    }
  }

  function deleteItem(id) {
    if (timers[id]) { clearTimeout(timers[id]); delete timers[id]; }
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tabTitle').textContent = tab === 'pending' ? '待辦事項' : '已完成';
    render();
  }

  function render() {
    const list = document.getElementById('itemList');
    const filtered = items.filter(i => currentTab === 'pending' ? !i.done : i.done);

    document.getElementById('countLabel').textContent = filtered.length + ' 項';

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">' + (currentTab === 'pending' ? '暫時冇待辦事項 🎉' : '未完成任何項目') + '</div>';
      return;
    }

    list.innerHTML = filtered.map(item => `
      <div class="item ${item.done ? 'done' : ''}" id="item-${item.id}">
        <div class="item-check" onclick="toggleDone(${item.id})">
          <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
            <path d="M1 5L5 9L12 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="item-body">
          <div class="item-title">${escHtml(item.title)}</div>
          <div class="item-meta">
            <span class="tag category">${escHtml(item.category)}</span>
            ${item.date && item.time ? `<span class="tag time">⏰ ${item.date} ${item.time}</span><span class="tag notify">提前30分鐘通知</span>` : item.date ? `<span class="tag time">📅 ${item.date}</span>` : ''}
          </div>
        </div>
        <button class="item-delete" onclick="deleteItem(${item.id})">×</button>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function scheduleNotification(item) {
    if (!item.date || !item.time) return;
    if (Notification.permission !== 'granted') return;

    const eventTime = new Date(item.date + 'T' + item.time);
    const notifyTime = new Date(eventTime.getTime() - 30 * 60 * 1000);
    const now = new Date();
    const delay = notifyTime - now;

    if (delay <= 0) return;

    if (timers[item.id]) clearTimeout(timers[item.id]);

    timers[item.id] = setTimeout(() => {
      new Notification('⏰ 待辦提醒', {
        body: `「${item.title}」將喺30分鐘後到期！`,
        icon: '📋'
      });
    }, delay);
  }

  function rescheduleAll() {
    items.forEach(item => {
      if (!item.done) scheduleNotification(item);
    });
  }

  async function requestNotify() {
    if (!('Notification' in window)) {
      document.getElementById('notifyStatus').textContent = '狀態：你嘅瀏覽器唔支援通知';
      return;
    }
    const result = await Notification.requestPermission();
    updateNotifyStatus();
    if (result === 'granted') {
      rescheduleAll();
    }
  }

  function updateNotifyStatus() {
    const el = document.getElementById('notifyStatus');
    if (!('Notification' in window)) {
      el.textContent = '狀態：唔支援通知';
    } else if (Notification.permission === 'granted') {
      el.textContent = '狀態：✅ 通知已開啟';
    } else if (Notification.permission === 'denied') {
      el.textContent = '狀態：❌ 通知已被拒絕（請喺設定入面手動開啟）';
    } else {
      el.textContent = '狀態：請撳上面按鈕開啟通知';
    }
  }

  // Init
  updateNotifyStatus();
  rescheduleAll();
  render();

  // Set default date to today
  document.getElementById('dateInput').valueAsDate = new Date();
</script>

</body>
</html>
